<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>実施記録文例サンプル</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <main class="material-page">
    <p class="eyebrow">Record wording sample</p>
    <h1>実施記録文例</h1>
    <section class="material-section">
      <h2>書き方の考え方</h2>
      <ul>
        <li>できた・できないだけで終わらせない。</li>
        <li>本人が選んだ工夫や次回試すことを書く。</li>
        <li>診断や性格を断定する表現を避ける。</li>
      </ul>
    </section>
    <section class="material-section">
      <h2>文例</h2>
      <table><tr><th>テーマ</th><th>記録例</th></tr><tr><td>挨拶</td><td>挨拶の声量と姿勢について確認し、本人は次回試す工夫を一つ選択した。</td></tr><tr><td>報連相</td><td>困った場面の伝え方を整理し、本人は短い相談文を作成した。</td></tr><tr><td>金銭管理</td><td>支出を分ける考え方を確認し、買い物前の確認項目を選択した。</td></tr></table>
    </section>
  </main>
</body>
</html>
