<!doctype html>
<html lang="ja">

<body>

      <tr><td>2週目</td><td>報告・連絡・相談</td><td>困った時の伝え方を練習</td><td>フル教材</td></tr>
      <tr><td>3週目</td><td>金銭管理の基本</td><td>給料日後の使い方を整理</td><td>フル教材</td></tr>
      <tr><td>4週目</td><td>質問の仕方</td><td>わからない時の短い質問文を作る</td><td>プレビュー</td></tr>
    </table>
  </main>
