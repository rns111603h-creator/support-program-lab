<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>教材キット: 金銭管理の基本</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <main class="material-page">
    <p class="eyebrow">Full sample kit / 60 minutes</p>
    <h1>金銭管理の基本</h1>
    <p>目的: 収入、必要な支払い、自由に使えるお金を分けて考える。</p>
    <section class="material-section">
      <h2>講師用進行台本</h2>
      <ol>
        <li>給料日後に困りやすい場面を、責めない形で確認する。</li>
        <li>「先に必要な支払いを分ける」考え方を説明する。</li>
        <li>一週間の使い方を表に書き、買う前に確認する項目を選ぶ。</li>
        <li>困った時に相談する相手を確認する。</li>
      </ol>
    </section>
    <section class="material-section">
      <h2>予算ワーク</h2>
      <table><tr><th>項目</th><th>金額</th><th>メモ</th></tr><tr><td>必要な支払い</td><td></td><td></td></tr><tr><td>食費・交通費</td><td></td><td></td></tr><tr><td>自由に使うお金</td><td></td><td></td></tr></table>
    </section>
    <section class="material-section">
      <h2>記録文例</h2>
      <p>収入と支出の分け方を確認し、本人は買い物前に必要な支払いを確認する方法に関心を示した。</p>
    </section>
  </main>
</body>
</html>
